# cliff.toml — git-cliff configuration.
# Regenerates CHANGELOG.md from conventional-commit messages.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. This project follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

The file is regenerated by [git-cliff](https://github.com/orhun/git-cliff) on every push to `main`. Hand-edits between releases will be overwritten — write conventional-commit messages instead.

"""

body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first | trim }}{% if commit.id %} (`{{ commit.id | truncate(length=7, end="") }}`){% endif %}
    {%- endfor %}
{% endfor %}
"""

footer = """
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true

# Map conventional-commit prefixes → grouped sections in the changelog.
commit_parsers = [
  { message = "^feat",      group = "Added" },
  { message = "^fix",       group = "Fixed" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Changed" },
  { message = "^doc",       group = "Documentation" },
  { message = "^style",     group = "Style" },
  { message = "^test",      group = "Tests" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)",    group = "Dependencies" },
  { message = "^chore",     group = "Repo plumbing" },
  { message = "^revert",    group = "Reverted" },
  { body = ".*security",    group = "Security" },
  { message = ".*",         group = "Other" },
]

# Filter merge commits and noisy boilerplate.
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
